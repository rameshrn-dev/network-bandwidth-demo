worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    server {
        listen 80;
        root /usr/share/nginx/html;

        location /stream.bin {
            # No rate limiting — the router's tc qdisc controls bandwidth
            add_header Cache-Control "no-store";
        }
    }
}
